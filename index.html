<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>NEON STACK — 레트로 테트리스</title>
<style>
:root{--g:#84ff72;--y:#f7ff68;--c:#57e7ff;--r:#ff5470;--bg:#020604}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--g);font-family:"Courier New",monospace;overflow:hidden}body{display:grid;place-items:center;padding:10px;background:radial-gradient(circle at 50% 25%,#15301d,#040a06 58%,#010201)}.machine{position:relative;width:min(96vw,850px);height:min(96vh,900px);padding:12px;display:grid;grid-template-rows:auto 1fr auto;gap:9px;border:3px solid #31663b;border-radius:18px;background:#061009;box-shadow:0 0 0 4px #010402,0 0 45px #1fc5533b,inset 0 0 30px #000}.machine:after{content:"";position:absolute;z-index:30;pointer-events:none;inset:0;border-radius:15px;background:repeating-linear-gradient(0deg,#0000 0 3px,#0006 4px);mix-blend-mode:multiply;animation:flicker .13s infinite}@keyframes flicker{50%{opacity:.82}}header{display:flex;justify-content:space-between;align-items:center;font-weight:bold;text-shadow:0 0 8px currentColor;font-size:clamp(12px,2.3vw,18px)}.title{color:var(--y);letter-spacing:3px}.screen{position:relative;min-height:0;display:grid;grid-template-columns:130px minmax(180px,1fr) 130px;gap:10px;padding:10px;border:2px solid #2c6739;border-radius:10px;background:#020604;overflow:hidden}.side{display:flex;flex-direction:column;gap:14px}.box{padding:9px;border:1px solid #286638;background:#06110a;text-align:center;box-shadow:inset 0 0 12px #000}.label{margin-bottom:6px;font-size:11px;letter-spacing:2px;color:#70b77b}.num{font-weight:bold;font-size:clamp(16px,3vw,24px);color:#fff;text-shadow:0 0 8px #fff}.mini{display:block;width:100%;aspect-ratio:1.2;image-rendering:pixelated}.well{position:relative;min-height:0;display:grid;place-items:center}#game{height:100%;max-width:100%;aspect-ratio:1/2;border:3px solid #3c8a49;background:#030a05;image-rendering:pixelated;box-shadow:0 0 22px #2da94755}.overlay{position:absolute;inset:0;z-index:10;display:grid;place-items:center;padding:18px;background:#020604d9;text-align:center}.panel{max-width:500px;padding:24px;border:2px solid var(--g);background:#07130ef2;box-shadow:0 0 22px #5cff7755;text-shadow:0 0 8px currentColor}h1{margin:0 0 15px;color:var(--y);font-size:clamp(38px,9vw,72px);line-height:.82;letter-spacing:-4px}h1 small{display:block;margin-top:15px;color:var(--c);font-size:.25em;letter-spacing:5px}p{line-height:1.5}button{border:0;padding:11px 15px;color:#031006;background:var(--g);font:inherit;font-weight:bold;box-shadow:4px 4px 0 #174c25;cursor:pointer;touch-action:manipulation}button:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #174c25}.hidden{display:none}.blink{animation:blink 1s steps(2) infinite}@keyframes blink{50%{opacity:0}}.controls{display:none;grid-template-columns:repeat(6,1fr);gap:6px}.controls button{padding:11px 4px;font-size:18px}footer{font-size:11px;color:#69aa73;text-align:center;letter-spacing:.5px}
@media(max-width:650px),(pointer:coarse){body{padding:0}.machine{width:100vw;height:100dvh;border-radius:0;padding:7px}.screen{grid-template-columns:64px minmax(120px,1fr) 64px;padding:5px;gap:5px}.box{padding:4px}.label{font-size:8px}.num{font-size:14px}.side{gap:6px}.controls{display:grid}footer{display:none}.title{font-size:12px}}
</style></head><body><main class="machine"><header><span>LEVEL <b id="level">1</b></span><span class="title">◆ NEON STACK ◆</span><span>LINES <b id="lines">0</b></span></header><section class="screen"><aside class="side"><div class="box"><div class="label">HOLD [C]</div><canvas class="mini" id="hold" width="100" height="80"></canvas></div><div class="box"><div class="label">SCORE</div><div class="num" id="score">000000</div></div></aside><div class="well"><canvas id="game" width="300" height="600" aria-label="테트리스 게임 화면"></canvas><div class="overlay" id="overlay"><div class="panel"><h1>NEON<br>STACK<small>레트로 테트리스</small></h1><p>블록을 쌓아 가로줄을 완성하세요.<br>고스트 블록으로 착지 위치를 확인!</p><p>← → 이동　↑ 회전　↓ 내리기<br>SPACE 즉시 낙하　C 보관　P 일시정지</p><button id="start">PRESS START</button><p class="blink">INSERT BLOCK_</p></div></div></div><aside class="side"><div class="box"><div class="label">NEXT</div><canvas class="mini" id="next" width="100" height="80"></canvas></div><div class="box"><div class="label">HIGH</div><div class="num" id="high">000000</div></div></aside></section><div class="controls" aria-label="모바일 조작"><button data-a="left">◀</button><button data-a="right">▶</button><button data-a="rotate">↻</button><button data-a="down">▼</button><button data-a="drop">⇊</button><button data-a="hold">H</button></div><footer>ARROWS MOVE · SPACE DROP · C HOLD · P PAUSE</footer></main>
<script>
/* NEON STACK: 외부 라이브러리 없이 실행되는 단일 HTML 테트리스 */
(()=>{'use strict';
const $=q=>document.querySelector(q),cv=$('#game'),cx=cv.getContext('2d'),nextCv=$('#next'),nextCx=nextCv.getContext('2d'),holdCv=$('#hold'),holdCx=holdCv.getContext('2d');
const COLS=10,ROWS=20,SIZE=30,COLORS=['','#57e7ff','#5373ff','#ff9c45','#f7ff68','#65ff72','#b866ff','#ff5470'];
// 7가지 테트로미노. 숫자는 색상 인덱스이기도 하다.
const SHAPES={I:[[1,1,1,1]],J:[[2,0,0],[2,2,2]],L:[[0,0,3],[3,3,3]],O:[[4,4],[4,4]],S:[[0,5,5],[5,5,0]],T:[[0,6,0],[6,6,6]],Z:[[7,7,0],[0,7,7]]};
let board,piece,next,hold=null,bag=[],canHold=true,score=0,lines=0,level=1,high=+(localStorage.neonStackHigh||0),state='title',last=0,dropClock=0,flash=0,shake=0;
const ui={score:$('#score'),lines:$('#lines'),level:$('#level'),high:$('#high'),overlay:$('#overlay')};ui.high.textContent=pad(high);
function pad(n){return String(n).padStart(6,'0')}function empty(){return Array.from({length:ROWS},()=>Array(COLS).fill(0))}
// 7-bag 방식이라 모든 블록이 공평하게 등장한다.
function takeType(){if(!bag.length)bag=Object.keys(SHAPES).sort(()=>Math.random()-.5);return bag.pop()}
function make(type=takeType()){return{type,m:SHAPES[type].map(r=>r.slice()),x:3,y:-1}}
function start(){board=empty();score=lines=0;level=1;bag=[];hold=null;piece=make();next=make();canHold=true;state='play';dropClock=0;ui.overlay.classList.add('hidden');sync();drawMini(holdCx,null);drawMini(nextCx,next)}
function collision(p,dx=0,dy=0,m=p.m){for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++)if(m[y][x]){const nx=p.x+x+dx,ny=p.y+y+dy;if(nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&board[ny][nx]))return true}return false}
function rotateMatrix(m){return m[0].map((_,i)=>m.map(r=>r[i]).reverse())}
function rotate(){if(state!=='play')return;const m=rotateMatrix(piece.m);for(const kick of [0,-1,1,-2,2])if(!collision(piece,kick,0,m)){piece.x+=kick;piece.m=m;score+=2;return}}
function move(dx){if(state==='play'&&!collision(piece,dx,0)){piece.x+=dx;score++}}
function down(manual=false){if(state!=='play')return;if(!collision(piece,0,1)){piece.y++;if(manual)score++}else lock()}
function hardDrop(){if(state!=='play')return;let n=0;while(!collision(piece,0,1)){piece.y++;n++}score+=n*2;shake=5;lock()}
function lock(){for(let y=0;y<piece.m.length;y++)for(let x=0;x<piece.m[y].length;x++)if(piece.m[y][x]){const by=piece.y+y;if(by<0)return gameOver();board[by][piece.x+x]=piece.m[y][x]}clearLines();piece=next;piece.x=3;piece.y=-1;next=make();canHold=true;drawMini(nextCx,next);if(collision(piece))gameOver();sync()}
function clearLines(){let count=0;for(let y=ROWS-1;y>=0;y--)if(board[y].every(Boolean)){board.splice(y,1);board.unshift(Array(COLS).fill(0));count++;y++}if(count){const bonus=[0,100,300,500,800][count]*level;score+=bonus;lines+=count;level=1+Math.floor(lines/10);flash=.22;shake=8}}
function doHold(){if(state!=='play'||!canHold)return;const old=piece.type;if(hold){piece=make(hold);hold=old}else{hold=old;piece=next;next=make();drawMini(nextCx,next)}piece.x=3;piece.y=-1;canHold=false;drawMini(holdCx,{type:hold,m:SHAPES[hold]})}
function gameOver(){state='over';high=Math.max(high,score);localStorage.neonStackHigh=high;sync();ui.overlay.classList.remove('hidden');ui.overlay.innerHTML=`<div class="panel"><h1>GAME<br>OVER<small>SCORE ${pad(score)}</small></h1><p>${lines}줄 제거 · 레벨 ${level}</p><button id="restart">다시 쌓기</button><p class="blink">TRY AGAIN_</p></div>`;$('#restart').onclick=start}
function sync(){ui.score.textContent=pad(score);ui.lines.textContent=lines;ui.level.textContent=level;ui.high.textContent=pad(Math.max(high,score))}
function cell(c,x,y,a=1,context=cx,size=SIZE){if(!c)return;context.globalAlpha=a;context.fillStyle=COLORS[c];context.fillRect(x*size+1,y*size+1,size-2,size-2);context.fillStyle='#ffffff66';context.fillRect(x*size+3,y*size+3,size-6,3);context.fillStyle='#00000055';context.fillRect(x*size+size-5,y*size+4,3,size-8);context.globalAlpha=1}
function ghostY(){let y=piece.y;while(!collision({...piece,y},0,1))y++;return y}
function draw(){cx.fillStyle=flash?'#16331c':'#020704';cx.fillRect(0,0,cv.width,cv.height);cx.save();if(shake)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);cx.strokeStyle='#15381e';cx.lineWidth=1;for(let x=0;x<=COLS;x++){cx.beginPath();cx.moveTo(x*SIZE,0);cx.lineTo(x*SIZE,cv.height);cx.stroke()}for(let y=0;y<=ROWS;y++){cx.beginPath();cx.moveTo(0,y*SIZE);cx.lineTo(cv.width,y*SIZE);cx.stroke()}if(board)for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)cell(board[y][x],x,y);if(piece&&state!=='title'){const gy=ghostY();for(let y=0;y<piece.m.length;y++)for(let x=0;x<piece.m[y].length;x++)if(piece.m[y][x])cell(piece.m[y][x],piece.x+x,gy+y,.18);for(let y=0;y<piece.m.length;y++)for(let x=0;x<piece.m[y].length;x++)if(piece.m[y][x]&&piece.y+y>=0)cell(piece.m[y][x],piece.x+x,piece.y+y)}cx.restore()}
function drawMini(c,p){c.fillStyle='#020704';c.fillRect(0,0,c.canvas.width,c.canvas.height);if(!p)return;const s=18,m=p.m,ox=(c.canvas.width-m[0].length*s)/2,oy=(c.canvas.height-m.length*s)/2;for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++)if(m[y][x]){c.fillStyle=COLORS[m[y][x]];c.fillRect(ox+x*s+1,oy+y*s+1,s-2,s-2);c.fillStyle='#ffffff77';c.fillRect(ox+x*s+3,oy+y*s+3,s-6,2)}}
function update(dt){if(state!=='play')return;dropClock+=dt;const speed=Math.max(.07,.72-(level-1)*.055);if(dropClock>=speed){down();dropClock=0}flash=Math.max(0,flash-dt);shake=Math.max(0,shake-dt*30);sync()}
function loop(t){const dt=Math.min(.05,(t-last)/1000||0);last=t;if(state!=='pause')update(dt);draw();requestAnimationFrame(loop)}
const actions={left:()=>move(-1),right:()=>move(1),rotate,down:()=>down(true),drop:hardDrop,hold:doHold};addEventListener('keydown',e=>{const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'rotate',ArrowDown:'down',' ':'drop',c:'hold',C:'hold'};if(map[e.key]){e.preventDefault();actions[map[e.key]]()}if(e.key==='p'||e.key==='P')state=state==='pause'?'play':state==='play'?'pause':state});document.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault();actions[b.dataset.a]()}));$('#start').onclick=start;requestAnimationFrame(loop);
})();
</script></body></html>
